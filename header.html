<script>
    // Mobile Menu Toggle
    document.getElementById('mobileToggle').addEventListener('click', function() {
        var navArea = document.getElementById('navArea');
        navArea.classList.toggle('active');
    });

    // Dropdown Toggle on Mobile
    var dropdownButtons = document.querySelectorAll('.has-dropdown > a');
    dropdownButtons.forEach(function(button) {
        button.addEventListener('click', function(e) {
            var isMobile = window.innerWidth <= 991;
            if (isMobile) {
                e.preventDefault();
                var parent = this.parentElement;
                parent.classList.toggle('active');
            }
        });
    });

    // Close menu when clicking on a link
    var menuLinks = document.querySelectorAll('.premium-menu a:not(.has-dropdown > a)');
    menuLinks.forEach(function(link) {
        link.addEventListener('click', function() {
            var navArea = document.getElementById('navArea');
            navArea.classList.remove('active');
        });
    });
</script>
